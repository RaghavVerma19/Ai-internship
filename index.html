    <title>InternAI: AI Internship Finder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // Prevents dark mode flashing
      (function() {
        if (
          localStorage.getItem('theme') === 'dark' ||
          (!('theme' in localStorage) &&
            window.matchMedia('(prefers-color-scheme: dark)').matches)
        ) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'primary': '#1a73e8',
              'primary-hover': '#1867cf',
              'background': '#f8f9fa',
              'surface': '#ffffff',
              'on-surface': '#202124',
              'on-surface-secondary': '#5f6368',
              'border': '#e0e0e0',
              // Dark theme colors
              'dark-primary': '#8ab4f8',
              'dark-primary-hover': '#9ac0f9',
              'dark-background': '#121212',
              'dark-surface': '#1e1e1e',
              'dark-on-surface': '#e8eaed',
              'dark-on-surface-secondary': '#969ba1',
              'dark-border': '#3c4043',
            },
            fontFamily: {
                sans: ['"Google Sans"', 'sans-serif', 'system-ui']
            }
          },
        },
      }
    </script>
